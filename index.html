<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Bubble Pop v0.1.6</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#87CEFA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bubble Pop">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        body { 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
            font-family: 'Arial', sans-serif; background-color: #87CEFA;
            background-position: center; background-repeat: no-repeat; background-size: cover;
            transition: background-image 1.2s ease-in-out; 
        }
        canvas { display: block; background: transparent; }

        #ui-left {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: clamp(16px, 4vw, 24px); font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.2); padding: 8px 18px; border-radius: 25px;
            pointer-events: none; z-index: 10; display: none; 
        }

        #ui-right {
            position: absolute; top: 20px; right: 20px; z-index: 20; display: none; 
        }
        #lang-btn {
            background: #ffcf4b; border: 3px solid white; border-radius: 25px;
            padding: 8px 20px; font-size: 18px; font-weight: bold; color: #5d4037;
            cursor: pointer; box-shadow: 0 4px 0 #d4a017;
            transition: all 0.1s;
        }
        #lang-btn:active { transform: translateY(4px); box-shadow: none; }

        #hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: white; font-size: clamp(20px, 5vw, 32px); font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6); pointer-events: none; display: none; 
        }
        
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #87CEFA 0%, #a1c4fd 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
        #start-btn {
            background: #ff6b6b; border: 6px solid white; border-radius: 40px;
            padding: 20px 60px; font-size: clamp(40px, 8vw, 60px); font-weight: bold; color: white;
            cursor: pointer; box-shadow: 0 10px 0 #c92a2a;
            transition: all 0.1s; text-align: center; line-height: 1.2;
        }
        #start-btn:active { transform: translateY(10px); box-shadow: none; }
        #start-btn span { font-size: clamp(20px, 4vw, 30px); opacity: 0.9; }

        .version-tag {
            position: absolute; bottom: 10px; right: 15px;
            color: rgba(255, 255, 255, 0.7); font-size: 14px; font-weight: bold; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <button id="start-btn">เริ่มเกม<br><span>Start Game</span></button>
        <div class="version-tag">v 0.1.6</div>
    </div>

    <div id="ui-left"><span id="scoreText">สัตว์ที่เจอ</span>: <span id="scoreDisplay">0</span></div>
    <div id="ui-right"><button id="lang-btn">TH / EN</button></div>
    <div id="hint">จิ้มเพื่อเริ่มสนุก!</div>
    <div class="version-tag">v 0.1.6</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreText = document.getElementById('scoreText');
        const hintDisplay = document.getElementById('hint');
        const langBtn = document.getElementById('lang-btn');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        
        const uiElements = [document.getElementById('ui-left'), document.getElementById('ui-right'), hintDisplay];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let currentLang = 'th'; 
        let score = 0;
        let currentStageIndex = -1;
        let bubbles = [];
        let particles = [];
        let isGameRunning = false;
        
        // --- อัปเกรดระบบเสียงด้วย Web Audio API ---
        let bgmPlayer = new Audio();
        bgmPlayer.loop = true;
        bgmPlayer.crossOrigin = "anonymous"; // ป้องกันปัญหาเวลาดึงไฟล์
        
        let audioCtx;
        let gainNode;

        function setupWebAudio() {
            if (!audioCtx) {
                // สร้างระบบเสียงขั้นสูง
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const track = audioCtx.createMediaElementSource(bgmPlayer);
                gainNode = audioCtx.createGain();
                
                // บังคับระดับเสียงตรงนี้ (0.25 = 25%) 
                gainNode.gain.value = 0.25; 
                
                // เชื่อมต่อสายเสียงเข้าด้วยกัน
                track.connect(gainNode).connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        // ------------------------------------------

        const stages = [
            { 
                nameTh: "ฟาร์มแสนสนุก 🐄", nameEn: "Happy Farm 🐄", filename: "bg/farm-bg.jpg", music: "music/farm.mp3",
                animals: [{i:'🐮', th:'วัว', en:'Cow'}, {i:'🐷', th:'หมู', en:'Pig'}, {i:'🐥', th:'ลูกไก่', en:'Chick'}, {i:'🐴', th:'ม้า', en:'Horse'}, {i:'🐑', th:'แกะ', en:'Sheep'}, {i:'🐶', th:'สุนัข', en:'Dog'}, {i:'🦆', th:'เป็ด', en:'Duck'}] 
            },
            { 
                nameTh: "ป่าดงดิบ 🦁", nameEn: "Wild Jungle 🦁", filename: "bg/jungle-bg.jpg", music: "music/jungle.mp3",
                animals: [{i:'🦁', th:'สิงโต', en:'Lion'}, {i:'🐯', th:'เสือ', en:'Tiger'}, {i:'🐘', th:'ช้าง', en:'Elephant'}, {i:'🐵', th:'ลิง', en:'Monkey'}, {i:'🦒', th:'ยีราฟ', en:'Giraffe'}, {i:'🐍', th:'งู', en:'Snake'}, {i:'🐸', th:'กบ', en:'Frog'}] 
            },
            { 
                nameTh: "หาดทรายและทะเล 🐬", nameEn: "Deep Sea 🐬", filename: "bg/ocean-bg.jpg", music: "music/ocean.mp3",
                animals: [{i:'🐟', th:'ปลา', en:'Fish'}, {i:'🐙', th:'ปลาหมึก', en:'Octopus'}, {i:'🐬', th:'โลมา', en:'Dolphin'}, {i:'🦀', th:'ปู', en:'Crab'}, {i:'🐢', th:'เต่า', en:'Turtle'}, {i:'🐳', th:'วาฬ', en:'Whale'}, {i:'🦈', th:'ฉลาม', en:'Shark'}] 
            },
            { 
                nameTh: "สวนดอกไม้และแมลง 🦋", nameEn: "Bug Garden 🦋", filename: "bg/garden-bg.jpg", music: "music/garden.mp3",
                animals: [{i:'🦋', th:'ผีเสื้อ', en:'Butterfly'}, {i:'🐝', th:'ผึ้ง', en:'Bee'}, {i:'🐞', th:'เต่าทอง', en:'Ladybug'}, {i:'🐛', th:'หนอน', en:'Caterpillar'}, {i:'🐌', th:'หอยทาก', en:'Snail'}, {i:'🐜', th:'มด', en:'Ant'}, {i:'🦗', th:'ตั๊กแตน', en:'Grasshopper'}] 
            },
            { 
                nameTh: "ขั้วโลกน้ำแข็ง 🐧", nameEn: "Polar World 🐧", filename: "bg/polar-bg.jpg", music: "music/polar.mp3",
                animals: [{i:'🐧', th:'เพนกวิน', en:'Penguin'}, {i:'🐻‍❄️', th:'หมีขั้วโลก', en:'Polar Bear'}, {i:'🦭', th:'แมวน้ำ', en:'Seal'}, {i:'🦉', th:'นกฮูก', en:'Owl'}, {i:'🐺', th:'หมาป่า', en:'Wolf'}, {i:'🦊', th:'หมาจิ้งจอก', en:'Fox'}, {i:'🦌', th:'กวาง', en:'Deer'}] 
            },
            { 
                nameTh: "โลกไดโนเสาร์ 🦖", nameEn: "Dino Land 🦖", filename: "bg/dino-bg.jpg", music: "music/dino.mp3",
                animals: [{i:'🦖', th:'ทีเร็กซ์', en:'T-Rex'}, {i:'🦕', th:'คอยาว', en:'Dino'}, {i:'🐊', th:'จระเข้', en:'Crocodile'}, {i:'🦣', th:'แมมมอธ', en:'Mammoth'}, {i:'🦤', th:'นกโดโด', en:'Dodo'}, {i:'🦎', th:'กิ้งก่า', en:'Lizard'}, {i:'🦅', th:'นกอินทรี', en:'Eagle'}] 
            }
        ];

        stages.forEach(stage => { const img = new Image(); img.src = stage.filename; });

        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none'; 
            uiElements.forEach(el => el.style.display = 'block'); 
            isGameRunning = true;
            
            // เปิดใช้งานระบบ Web Audio ทันทีที่กดปุ่ม
            setupWebAudio();
            
            let wakeup = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(wakeup);
            
            checkStage(); 
            
            setInterval(() => { 
                if (bubbles.length < 8 && currentStageIndex !== -1 && isGameRunning) {
                    bubbles.push(new Bubble()); 
                }
            }, 1400);
        });

        langBtn.addEventListener('click', () => {
            currentLang = (currentLang === 'th') ? 'en' : 'th';
            scoreText.innerText = (currentLang === 'th') ? 'สัตว์ที่เจอ' : 'Animals found';
            updateUI();
        });

        function updateUI() {
            if (currentStageIndex >= 0) {
                hintDisplay.innerText = (currentLang === 'th') ? stages[currentStageIndex].nameTh : stages[currentStageIndex].nameEn;
            }
        }

        function playSound(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = (currentLang === 'th') ? 'th-TH' : 'en-US';
            utterance.rate = (currentLang === 'th') ? 1.3 : 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        function changeMusic(src) {
            if (bgmPlayer.src.includes(src)) return;
            bgmPlayer.src = src;
            // ใส่เผื่อไว้สำหรับ Browser ธรรมดา
            bgmPlayer.volume = 0.25; 
            bgmPlayer.play().catch(e => console.log("รอเล่นเพลง"));
        }

        function checkStage() {
            const nextIndex = Math.floor(score / 10) % stages.length;
            if (nextIndex !== currentStageIndex) {
                if (currentStageIndex !== -1) {
                    bubbles.forEach(b => {
                        for (let j = 0; j < 8; j++) particles.push(new Particle(b.x, b.y, b.color));
                    });
                    bubbles = []; 
                }
                currentStageIndex = nextIndex;
                const stage = stages[currentStageIndex];
                document.body.style.backgroundImage = `url('${stage.filename}')`;
                updateUI();
                changeMusic(stage.music);
                const msg = (currentLang === 'th') ? "ไปเที่ยว " + stage.nameTh : "Let's go to " + stage.nameEn;
                playSound(msg);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.life = 1.0;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.05; }
            draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1.0; }
        }

        class Bubble {
            constructor() {
                this.radius = 65 + Math.random() * 35;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = canvas.height + this.radius;
                this.isRainbow = Math.random() < 0.2;
                const baseSpeed = (this.isRainbow ? 1.5 : 0.7) + Math.random() * 0.8;
                this.speed = baseSpeed * 1.5;

                const currentAnimals = stages[currentStageIndex].animals;
                this.animalData = currentAnimals[Math.floor(Math.random() * currentAnimals.length)];
                this.hue = Math.random() * 360;
                this.oscillation = 0;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + Math.sin(this.oscillation) * 15, this.y);
                if (this.isRainbow) { this.hue = (this.hue + 3) % 360; this.color = `hsla(${this.hue}, 90%, 70%, 0.7)`; } 
                else { this.color = `hsla(${this.hue}, 80%, 75%, 0.6)`; }
                const grad = ctx.createRadialGradient(-this.radius/3, -this.radius/3, 5, 0, 0, this.radius);
                grad.addColorStop(0, 'rgba(255,255,255,0.9)');
                grad.addColorStop(1, this.color);
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad; ctx.fill();
                ctx.strokeStyle = this.isRainbow ? `hsla(${this.hue}, 100%, 50%, 0.8)` : "rgba(255,255,255,0.3)";
                ctx.lineWidth = this.isRainbow ? 4 : 1;
                ctx.stroke();
                ctx.font = `${this.radius * 0.7}px Arial`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.animalData.i, 0, 0);
                ctx.restore();
            }
            update() { this.y -= this.speed; this.oscillation += 0.03; }
        }

        function handlePop(x, y) {
            if (!isGameRunning) return; 

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                if (Math.hypot(b.x - x, b.y - y) < b.radius + 35) { 
                    const pColor = b.isRainbow ? `hsla(${b.hue}, 100%, 60%, 1)` : b.color;
                    for (let j = 0; j < 15; j++) particles.push(new Particle(b.x, b.y, pColor));
                    
                    playSound((currentLang === 'th') ? b.animalData.th : b.animalData.en);
                    
                    bubbles.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = score;
                    checkStage();
                    break;
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => handlePop(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            Array.from(e.changedTouches).forEach(t => handlePop(t.clientX, t.clientY));
        }, { passive: false });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bubbles.forEach((b, i) => { b.update(); b.draw(); if (b.y + b.radius < 0) bubbles.splice(i, 1); });
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
            requestAnimationFrame(animate);
        }

        animate(); 
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
